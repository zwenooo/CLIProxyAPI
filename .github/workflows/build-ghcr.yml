name: build-ghcr

# Build the CLIProxyAPI image from this fork's source and push it to GHCR
# (ghcr.io/zwenooo/cli-proxy-api). Triggered manually via the Actions tab /
# `gh workflow run`, and automatically on code pushes to main.

on:
  workflow_dispatch:
    inputs:
      extra_tag:
        description: "Optional extra image tag (in addition to :latest and :<sha>)"
        required: false
        default: ""
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "examples/**"
      - "README*"

concurrency:
  group: build-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/zwenooo/cli-proxy-api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: meta
        run: |
          echo "version=$(git describe --tags --always 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.commit }}
            ${{ inputs.extra_tag != '' && format('{0}:{1}', env.IMAGE, inputs.extra_tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### Image pushed"
            echo ""
            echo "- \`${IMAGE}:latest\`"
            echo "- \`${IMAGE}:${{ steps.meta.outputs.commit }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
